<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="alternate icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#000000" />
  <title>Mindstream</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['DM Sans', 'sans-serif'],
          },
          colors: {
            'brand-indigo': '#191E38',
            'brand-surface': '#F8F9FA',
            'brand-teal': '#2DD4BF',
            'dark-surface': '#1F2937',
            'dark-surface-light': '#374151',
            // Enhanced semantic colors
            'mindstream-bg-primary': '#0F1419',
            'mindstream-bg-surface': '#1A1F2E',
            'mindstream-bg-elevated': '#242938',
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-in-out',
            'fade-in-up': 'fadeInUp 0.5s ease-in-out',
            'ripple': 'ripple 1s cubic-bezier(0, 0, 0.2, 1) infinite',
            'pulse-ring': 'pulse-ring 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: 0 },
              '100%': { opacity: 1 },
            },
            fadeInUp: {
              '0%': { opacity: 0, transform: 'translateY(20px)' },
              '100%': { opacity: 1, transform: 'translateY(0)' },
            },
            ripple: {
              '0%': { transform: 'scale(.8)', opacity: '1' },
              '100%': { transform: 'scale(2.4)', opacity: '0' },
            },
            'pulse-ring': {
              '0%': {
                opacity: '1',
                transform: 'scale(1)'
              },
              '100%': {
                opacity: '0',
                transform: 'scale(2)'
              }
            }
          }
        }
      }
    }
  </script>

</head>

<body class="bg-brand-indigo">
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
